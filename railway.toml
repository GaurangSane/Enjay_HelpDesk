D# railway.toml — Enjay Helpdesk Backend
# https://docs.railway.app/reference/config-as-code
#
# This file defines the two Railway services in one repo:
#   [web]    → FastAPI (uvicorn) — receives HTTP traffic
#   [worker] → Celery worker — processes async tasks
#
# Both services share the same source code and Docker build context.
# The only difference is the start command.

[build]
builder = "nixpacks"
buildCommand = "cd backend && pip install -r requirements.txt"

[[services]]
name = "web"

[services.deploy]
startCommand = "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30

[[services]]
name = "worker"

[services.deploy]
startCommand = "celery -A backend.celery_app.celery_app worker --loglevel=info --pool=solo --concurrency=2"

[
deploy
]
startCommand = "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"